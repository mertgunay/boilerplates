# nginx config for SigNoz UI.
#
# - Listens plain HTTP on :80. No TLS by design — terminate elsewhere
#   (ingress gateway, sidecar, network boundary like a VPN).
# - JSON access log, gzip, baseline security headers.
# - Per-location rate limiting: login is strict, API is generous,
#   websocket / livetail has no limit and a long timeout.
# - Static assets (content-hashed filenames) are cached for 7 days.

log_format json_combined escape=json
    '{"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"request_method":"$request_method",'
    '"request_uri":"$request_uri",'
    '"server_protocol":"$server_protocol",'
    '"status":$status,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"upstream_response_time":"$upstream_response_time",'
    '"upstream_status":"$upstream_status",'
    '"request_time":$request_time,'
    '"http_referer":"$http_referer",'
    '"http_user_agent":"$http_user_agent"}';

# Strict rate limit for login / register / invite endpoints (5 r/s).
limit_req_zone $binary_remote_addr zone=signoz_login:10m rate=5r/s;
# Generous rate limit for the regular API (60 r/s) — enough for SPA dashboard reloads.
limit_req_zone $binary_remote_addr zone=signoz_api:10m rate=60r/s;
limit_req_status 429;
limit_req_log_level warn;

server_tokens off;

server {
    listen 80;
    listen [::]:80;
    # Match any host. Set explicitly (and rebuild) if you want strict host
    # matching, e.g. server_name signoz.example.com;
    server_name _;

    access_log /var/log/nginx/access.log json_combined;

    gzip on;
    gzip_types text/plain application/json text/css application/javascript application/wasm image/svg+xml;
    gzip_min_length 1000;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # Note: SigNoz embeds third-party SDKs (e.g. Pylon, Appcues). Adding a
    # strict CSP without explicit allowlists for those will break the UI.
    # Configure CSP intentionally if you need it.

    proxy_http_version 1.1;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 120s;
    client_max_body_size 50m;

    # Static assets — no rate limit, long cache. Filenames are content-hashed
    # by the SigNoz frontend build, so we never need to invalidate.
    location ~* ^/(assets|static|fonts|images)/ {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_pass http://signoz:8080;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Auth endpoints — strict rate limit.
    location ~ ^/api/v1/(login|register|loginPrecheck|invite) {
        limit_req zone=signoz_login burst=10 nodelay;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_pass http://signoz:8080;
    }

    # Websocket / livetail — long polling, no rate limit, 24h read timeout.
    location ~ ^/(api/v1/.*/livetail|api/v3/.*/livetail|ws) {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_pass http://signoz:8080;
    }

    # Regular API — generous rate limit (60 r/s, burst 200).
    location /api/ {
        limit_req zone=signoz_api burst=200 nodelay;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_pass http://signoz:8080;
    }

    # SPA index.html and everything else — no rate limit.
    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_redirect off;
        proxy_pass http://signoz:8080;
    }
}
