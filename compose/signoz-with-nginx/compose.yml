# SigNoz with a hardened nginx reverse proxy in front.
#
# Same core as ../signoz, plus:
#   - nginx (read-only fs, dropped capabilities, tmpfs writeable mounts)
#   - rate limiting per location class (login / api / websocket / static)
#   - JSON access log, security headers, gzip
#   - SigNoz UI port is NOT published on the host — nginx fronts it
#
# nginx terminates plain HTTP on :80. Place this stack behind a network
# boundary (VPN, private subnet, ingress gateway with TLS termination, etc.)
# OR add a TLS layer to the nginx config — there is no TLS in this stack
# by design (keeps the boilerplate small).

x-logging-default: &logging-default
  driver: "local"
  options:
    max-size: "50m"
    max-file: "5"
    compress: "true"

x-clickhouse-defaults: &clickhouse-defaults
  image: clickhouse/clickhouse-server:25.5.6
  tty: true
  restart: unless-stopped
  depends_on:
    init-clickhouse:
      condition: service_completed_successfully
    zookeeper-1:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "wget", "--spider", "-q", "0.0.0.0:8123/ping"]
    interval: 30s
    timeout: 5s
    retries: 3
  ulimits:
    nproc: 65535
    nofile:
      soft: 262144
      hard: 262144
  environment:
    - CLICKHOUSE_SKIP_USER_SETUP=1
  logging: *logging-default

x-zookeeper-defaults: &zookeeper-defaults
  image: signoz/zookeeper:3.7.1
  user: root
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null"]
    interval: 30s
    timeout: 5s
    retries: 3
  logging: *logging-default

x-db-depend: &db-depend
  restart: unless-stopped
  depends_on:
    clickhouse:
      condition: service_healthy
  logging: *logging-default

services:

  nginx:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
    container_name: signoz-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /var/log/nginx
      - /tmp
    depends_on:
      signoz:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    logging: *logging-default

  init-clickhouse:
    image: clickhouse/clickhouse-server:25.5.6
    container_name: signoz-init-clickhouse
    command:
      - bash
      - -c
      - |
        version="v0.0.1"
        node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
        node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
        cd /tmp
        wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
        tar -xvzf histogram-quantile.tar.gz
        mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
    restart: on-failure
    volumes:
      - ./config/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/
    logging: *logging-default

  zookeeper-1:
    <<: *zookeeper-defaults
    container_name: signoz-zookeeper-1
    volumes:
      - signoz-zookeeper-1:/bitnami/zookeeper
    environment:
      - ZOO_SERVER_ID=1
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_AUTOPURGE_INTERVAL=1
      - ZOO_ENABLE_PROMETHEUS_METRICS=yes
      - ZOO_PROMETHEUS_METRICS_PORT_NUMBER=9141
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "0.5"

  clickhouse:
    <<: *clickhouse-defaults
    container_name: signoz-clickhouse
    volumes:
      - ./config/clickhouse/config.xml:/etc/clickhouse-server/config.xml
      - ./config/clickhouse/users.xml:/etc/clickhouse-server/users.xml
      - ./config/clickhouse/custom-function.xml:/etc/clickhouse-server/custom-function.xml
      - ./config/clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
      - ./config/clickhouse/users.d:/etc/clickhouse-server/users.d:ro
      - ./config/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/
      - signoz-clickhouse:/var/lib/clickhouse/
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 1g

  signoz:
    <<: *db-depend
    image: signoz/signoz:${SIGNOZ_VERSION:-v0.120.0}
    container_name: signoz
    volumes:
      - signoz-sqlite:/var/lib/signoz/
    # No `ports:` here — nginx fronts the UI on :80.
    environment:
      - SIGNOZ_ALERTMANAGER_PROVIDER=signoz
      - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_SQLSTORE_SQLITE_PATH=/var/lib/signoz/signoz.db
      - SIGNOZ_TOKENIZER_JWT_SECRET=${SIGNOZ_JWT_SECRET:?set SIGNOZ_JWT_SECRET in your env file (openssl rand -hex 32)}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  otel-collector:
    <<: *db-depend
    image: signoz/signoz-otel-collector:${SIGNOZ_OTELCOL_VERSION:-v0.144.3}
    container_name: signoz-otel-collector
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /signoz-otel-collector migrate sync check &&
        /signoz-otel-collector --config=/etc/otel-collector-config.yaml --manager-config=/etc/manager-config.yaml --copy-path=/var/tmp/collector-config.yaml
    volumes:
      - ./config/otel-collector-config.yaml:/etc/otel-collector-config.yaml
      - ./config/otel-collector-opamp-config.yaml:/etc/manager-config.yaml
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=${SIGNOZ_HOST_NAME:-signoz},os.type=linux
      - LOW_CARDINAL_EXCEPTION_GROUPING=false
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    ports:
      - "${OTLP_GRPC_PORT:-4317}:4317"
      - "${OTLP_HTTP_PORT:-4318}:4318"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  signoz-telemetrystore-migrator:
    <<: *db-depend
    image: signoz/signoz-otel-collector:${SIGNOZ_OTELCOL_VERSION:-v0.144.3}
    container_name: signoz-telemetrystore-migrator
    environment:
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /signoz-otel-collector migrate bootstrap &&
        /signoz-otel-collector migrate sync up &&
        /signoz-otel-collector migrate async up
    restart: on-failure

networks:
  default:
    name: signoz_net

volumes:
  signoz-clickhouse:
  signoz-sqlite:
  signoz-zookeeper-1:
