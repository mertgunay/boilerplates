# Default server block — replace or extend with your own.
#
# Common patterns are documented as commented blocks below.
# Reload nginx after editing: `docker compose exec nginx nginx -s reload`.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Healthcheck endpoint used by the container healthcheck and any
    # external load balancers.
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Static content served from /usr/share/nginx/html (mounted from ./html).
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # ----------------------------------------------------------------
    # Reverse proxy example (uncomment and adapt):
    #
    # location /api/ {
    #     proxy_pass http://upstream-service:8000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
    # ----------------------------------------------------------------
}

