# postgresql.conf — overrides for this stack.
#
# Postgres ships with a built-in default for every setting. Anything you do
# NOT set here falls back to the image default. Uncomment and tune only what
# you actually need.
#
# Reference: https://www.postgresql.org/docs/current/runtime-config.html
#
# ----------------------------------------------------------------------------
# Memory
# ----------------------------------------------------------------------------
# Rule of thumb: shared_buffers ~ 25% of container memory limit (cap ~ 8GB).
# shared_buffers = 256MB
# effective_cache_size = 1GB
# work_mem = 16MB
# maintenance_work_mem = 128MB
#
# ----------------------------------------------------------------------------
# Connections
# ----------------------------------------------------------------------------
# max_connections = 100
# Use a connection pooler (pgbouncer) before raising this past ~200.
#
# ----------------------------------------------------------------------------
# Write-ahead log
# ----------------------------------------------------------------------------
# wal_level = replica
# max_wal_size = 1GB
# min_wal_size = 80MB
# checkpoint_completion_target = 0.9
#
# ----------------------------------------------------------------------------
# Logging
# ----------------------------------------------------------------------------
# Log every statement that runs longer than this (ms). Useful for slow-query
# triage; noisy if set too low.
# log_min_duration_statement = 500
# log_line_prefix = '%t [%p]: db=%d,user=%u,app=%a,client=%h '
# log_connections = on
# log_disconnections = on
# log_lock_waits = on
#
# ----------------------------------------------------------------------------
# Autovacuum
# ----------------------------------------------------------------------------
# autovacuum = on
# autovacuum_naptime = 30s
