# Single-binary Tempo with the OTLP receiver enabled. Trace -> metric
# conversion (service graphs, span metrics) is forwarded to Mimir via
# the metrics_generator's remote_write.

server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

ingester:
  trace_idle_period: 30s
  max_block_bytes: 524288000
  max_block_duration: 5m
  flush_check_period: 10s

metrics_generator:
  processor:
    service_graphs:
      dimensions:
        - service.namespace
    span_metrics:
      dimensions:
        - service.namespace
        - http.response.status_code
        - http.request.method
        - http.route
        - url.path
        - db.system
        - db.operation.name
        - messaging.system
        - messaging.destination
        - messaging.operation
    local_blocks:
      max_block_duration: 2m
      flush_to_storage: false
  registry:
    collection_interval: 15s
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/metrics-generator/wal
    remote_write:
      - url: http://mimir:9009/api/v1/push
        send_exemplars: true
  traces_storage:
    path: /var/tempo/metrics-generator/traces

# 90 day retention (2160 hours). Match Loki/Mimir retention to keep the
# correlated-signal workflow consistent.
compactor:
  compaction:
    block_retention: 2160h
    compacted_block_retention: 1h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
    blocklist_poll: 5m

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
        - local-blocks

usage_report:
  reporting_enabled: false
