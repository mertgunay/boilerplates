# Single-node Mimir using filesystem storage. For multi-node or any
# meaningful ingest volume, switch blocks_storage.backend to S3-compatible
# and tune the rings accordingly.

multitenancy_enabled: false

server:
  http_listen_port: 9009
  log_level: warn

activity_tracker:
  filepath: /data/mimir/activity.log

blocks_storage:
  backend: filesystem
  bucket_store:
    sync_dir: /data/mimir/tsdb-sync
  filesystem:
    dir: /data/mimir/blocks
  tsdb:
    dir: /data/mimir/tsdb

compactor:
  data_dir: /data/mimir/compactor
  sharding_ring:
    kvstore:
      store: memberlist

distributor:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist

ingester:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist
    replication_factor: 1

store_gateway:
  sharding_ring:
    replication_factor: 1

ruler:
  rule_path: /data/mimir/ruler

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/rules

limits:
  compactor_blocks_retention_period: 90d
  out_of_order_time_window: 10m
