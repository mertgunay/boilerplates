apiVersion: 1

# Auto-provisioned datasources. Grafana picks these up at boot.
# The container DNS names (loki, mimir, tempo, pyroscope) match the
# service names in compose.yml.

datasources:
  - name: Mimir
    uid: mimir
    type: prometheus
    access: proxy
    url: http://mimir:9009/prometheus
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      prometheusType: Mimir
      timeInterval: "60s"
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: tempo

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      maxLines: 1000
      timeout: 60
      derivedFields:
        - name: TraceID
          matcherRegex: "\"trace_id\":\"(\\w+)\""
          url: "$${__value.raw}"
          datasourceUid: tempo
          matcherType: regex

  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    editable: false
    jsonData:
      httpMethod: GET
      tracesToLogsV2:
        datasourceUid: loki
        customQuery: true
        query: '{service_name=~".+"} | trace_id = "$${__trace.traceId}"'
      tracesToMetrics:
        datasourceUid: mimir
        queries:
          - name: Request rate
            query: "sum(rate(traces_spanmetrics_calls_total{$$__tags}[5m]))"
          - name: Error rate
            query: "sum(rate(traces_spanmetrics_calls_total{$$__tags, status_code=\"STATUS_CODE_ERROR\"}[5m]))"
          - name: Duration (p95)
            query: "histogram_quantile(0.95, sum(rate(traces_spanmetrics_duration_seconds_bucket{$$__tags}[5m])) by (le))"
      serviceMap:
        datasourceUid: mimir
      nodeGraph:
        enabled: true
      lokiSearch:
        datasourceUid: loki
      tracesToProfiles:
        datasourceUid: pyroscope
        tags:
          - key: service_name
        profileTypeId: 'process_cpu:cpu:nanoseconds:cpu:nanoseconds'

  - name: Pyroscope
    uid: pyroscope
    type: grafana-pyroscope-datasource
    access: proxy
    url: http://pyroscope:4040
    isDefault: false
    editable: false
