# Lints and validates every stack in the repo on every push and PR.
# Catches: YAML syntax errors, missing ${VAR} interpolation hooks,
# Dockerfile lint regressions, shell-script smells.
#
# The compose-config and hadolint matrices are discovered dynamically
# from the filesystem — adding a new stack does not require editing
# this file.

name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:

  discover:
    name: discover stacks and Dockerfiles
    runs-on: ubuntu-latest
    outputs:
      stacks: ${{ steps.scan.outputs.stacks }}
      dockerfiles: ${{ steps.scan.outputs.dockerfiles }}
    steps:
      - uses: actions/checkout@v6
      - id: scan
        run: |
          stacks=$(find compose -maxdepth 1 -mindepth 1 -type d -printf '%f\n' | sort | jq -R . | jq -sc .)
          dockerfiles=$(find compose -type f -name Dockerfile | sort | jq -R . | jq -sc .)
          echo "stacks=$stacks"      >> "$GITHUB_OUTPUT"
          echo "dockerfiles=$dockerfiles" >> "$GITHUB_OUTPUT"

  compose-config:
    name: compose config (${{ matrix.stack }})
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack: ${{ fromJson(needs.discover.outputs.stacks) }}
    steps:
      - uses: actions/checkout@v6
      - name: Validate compose file
        working-directory: compose/${{ matrix.stack }}
        # Provide a placeholder for every required key so the
        # `${VAR:?}` guards are satisfied during config-time
        # interpolation. This job never starts a container — it
        # only parses the compose graph.
        env:
          POSTGRES_DB: ci
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          REDIS_PASSWORD: ci
          DB_MYSQL_USER: ci
          DB_MYSQL_PASSWORD: ci
          DB_MYSQL_NAME: ci
          MYSQL_ROOT_PASSWORD: ci
          MYSQL_DATABASE: ci
          MYSQL_USER: ci
          MYSQL_PASSWORD: ci
          GRAFANA_ADMIN_PASSWORD: ci
          SIGNOZ_JWT_SECRET: ci
          TELEPORT_CLUSTER_NAME: ci
          TELEPORT_PROXY_PUBLIC_ADDR: ci
        run: docker compose config -q

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ibiqlik/action-yamllint@v3.1.1
        with:
          file_or_dir: .
          # Disable rules we don't enforce as a project style choice:
          # - line-length: README and config blocks are wrapped for
          #   readability, not column count
          # - comments-indentation: many compose files inline-comment
          #   sibling keys at different indent levels
          # - truthy.check-keys: compose `on:` etc. would otherwise warn
          # - indent-sequences: consistent (mixed in some upstream samples)
          # - document-start: we don't prefix `---`
          # - braces / colons: flow-style mappings like
          #   `{ condition: service_healthy }` are valid YAML; we don't
          #   enforce inside-brace whitespace
          config_data: |
            extends: default
            rules:
              line-length: disable
              comments-indentation: disable
              truthy:
                check-keys: false
              indentation:
                indent-sequences: consistent
              document-start: disable
              braces: disable
              colons: disable

  hadolint:
    name: hadolint (${{ matrix.dockerfile }})
    needs: discover
    runs-on: ubuntu-latest
    if: ${{ needs.discover.outputs.dockerfiles != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        dockerfile: ${{ fromJson(needs.discover.outputs.dockerfiles) }}
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ${{ matrix.dockerfile }}

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Pin to a specific tag instead of @master — branches accept
      # arbitrary commits and become a supply-chain risk over time.
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: ./compose
